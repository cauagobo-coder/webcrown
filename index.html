  <meta charset="UTF-8" />

  <meta name="description"
    content="WebCrown — Especialistas em criação de sites focados em conversão e SEO. Design premium, alta performance e resultados reais." />
  <meta name="theme-color" content="#050505" />
  <title>WebCrown</title>

  <!-- Segurança (Lighthouse Best Practices Fallback) -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />

  <!-- Open Graph / WhatsApp (Facebook, LinkedIn, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="WebCrown" />
  <meta property="og:description" content="Especialistas em criação de sites focados em conversão e SEO. Design premium, alta performance e resultados reais." />
  <meta property="og:image" content="https://webcrown.vercel.app/og-image.png" />
  <meta property="og:url" content="https://webcrown.vercel.app/" />

  <!-- Twitter / Discord Large Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="WebCrown" />
  <meta name="twitter:description" content="Especialistas em criação de sites focados em conversão e SEO. Design premium, alta performance e resultados reais." />
  <meta name="twitter:image" content="https://webcrown.vercel.app/og-image.png" />


  <!-- Preloads de vídeo removidos para não estrangular a banda do JavaScript Bundle (Melhoria de FCP/LCP para CSR) -->
  <!-- Preconnect e Fetch em Paralelo para Fontes (~Ganha 200-500ms no FCP/LCP mobile) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />

  <!-- Carregamento Assíncrono para eliminar o Render Blocking (Ganho de 1.2s no Mobile) -->
  <link rel="preload" as="style" href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&display=swap" />
  
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&display=swap" media="print" onload="this.media='all'" />

  <!-- Noscript Fallback -->
  <noscript>
    <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
